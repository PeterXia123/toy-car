variables:
  rpt_mth:
    type: Date
    dtype: integer
    format: "YYYYMM (e.g. 202106)"
    description: "Observation month"
    downstream: [Data, Score_Alignment, DF, EAD, LGD, ERL, SICR]

  eid:
    type: ID
    dtype: string_or_integer
    description: "Account identifier"
    downstream: [Data]

  past_d:
    type: Term
    dtype: float
    description: "Days past due"
    downstream: [Data, Score_Alignment, LGD, ERL]
    constraints:
      min: 0

  past_c:
    type: Term
    dtype: float
    description: "Cycles past due"
    downstream: [Data, ERL]
    constraints:
      min: 0

  rcv_amt:
    type: Value
    dtype: float
    description: "Recovery amount"
    downstream: [Data, LGD]

  cur_amt:
    type: Value
    dtype: float
    description: "Account balance"
    downstream: [Data, LGD, EAD]
    constraints:
      min: 0

  grp1:
    type: Derived
    dtype: integer
    format: "0-4 (0=functional, 1=default, 2=chargeoff, 3=closed, 4=excluded)"
    description: "Performance level 1"
    downstream: [Data, DF, SICR, EAD, Score_Alignment]
    valid_values: [0, 1, 2, 3, 4]

  grp2:
    type: Derived
    dtype: integer
    format: "0 or 1"
    description: "Performance level 2 - 12-month forward default indicator (0=no default, 1=will default)"
    downstream: [Data, DF, Score_Alignment]
    valid_values: [0, 1]

  fl_close:
    type: Status
    dtype: integer
    format: "0 or 1"
    description: "Closed indicator"
    downstream: [Data, LGD, ERL]
    valid_values: [0, 1]

  fl_wo:
    type: Status
    dtype: integer
    format: "0 or 1"
    description: "Charge-off indicator"
    downstream: [Data, LGD]
    valid_values: [0, 1]

  fl_evt:
    type: Derived
    dtype: integer
    format: "0 or 1"
    description: "Default indicator (point-in-time)"
    downstream: [Data, PD, ERL]
    valid_values: [0, 1]

  lag_fl_evt:
    type: Derived
    dtype: integer
    format: "0 or 1"
    description: "Lagged default indicator (previous month)"
    downstream: [Data, PD]
    valid_values: [0, 1]

  new_evt:
    type: Derived
    dtype: integer
    format: "0 or 1"
    description: "New to default indicator"
    downstream: [Data, PD]
    valid_values: [0, 1]

  sc_orig:
    type: Score
    dtype: float
    format: "numeric 0-999"
    description: "Origination score (analyze on mob < 6)"
    downstream: [Score_Alignment, PD, SICR]
    constraints:
      min: 0
      max: 999

  sc_curr:
    type: Score
    dtype: float
    format: "numeric 0-999"
    description: "Behavior score (analyze on mob >= 6)"
    downstream: [Score_Alignment, PD, SICR]
    constraints:
      min: 0
      max: 999

  dt_start:
    type: Date
    dtype: datetime
    format: "YYYY-MM-DD"
    description: "Account open date"
    downstream: [Data, Score_Alignment, DF, ERL, SICR]

  dt_end:
    type: Date
    dtype: datetime
    format: "YYYY-MM-DD"
    description: "Maturity date"
    downstream: [Data, DF, ERL]

  tot_term:
    type: Term
    dtype: float
    unit: months
    description: "Loan term in months"
    downstream: [Data, DF, SICR]
    constraints:
      min: 0

  rem_term:
    type: Term
    dtype: float
    unit: months
    description: "Remaining term in months"
    downstream: [Data, DF]

  mos_bk:
    type: Term
    dtype: float
    unit: months
    description: "Months on book"
    downstream: [DF, SICR, Score_Alignment]
    constraints:
      min: 0

  ann_rate:
    type: Rate
    dtype: float
    format: "decimal (0.055 = 5.5%)"
    description: "Annualized interest rate"
    downstream: [LGD, EAD]
    constraints:
      min: 0
      max: 1

  face_val:
    type: Value
    dtype: float
    description: "Original loan value"
    downstream: [Data, EAD]
    constraints:
      min: 0

  init_amt:
    type: Value
    dtype: float
    description: "Booked amount at origination"
    downstream: [Data]
    constraints:
      min: 0

  fl_restr:
    type: Status
    dtype: integer
    format: "0 or 1"
    description: "Restructure indicator"
    downstream: [Score_Alignment]
    valid_values: [0, 1]

  fwd_amt:
    type: Value
    dtype: float
    description: "Balance at next default event"
    downstream: [LGD, EAD]

  mos_to_evt:
    type: Term
    dtype: float
    unit: months
    description: "Months to default event"
    downstream: [PD, DF]
    constraints:
      min: 0

  max_lim:
    type: Value
    dtype: float
    description: "Credit limit (revolving products only)"
    downstream: [EAD]
    constraints:
      min: 0

  fl_excl:
    type: Status
    dtype: integer
    format: "0 or 1"
    description: "Exclusion indicator"
    downstream: [Data]
    valid_values: [0, 1]
