project:
  name: "MX Mortgage - Synthetic Test"
  country: MX
  product: MG
  product_type: term
  entity: "Test Entity"

data:
  path: "test_data"
  file: "mx_mg_synthetic.parquet"
  format: parquet

column_mapping:
  rpt_mth: obs_month
  eid: acct_id
  past_d: dpd
  past_c: cpd
  cur_amt: balance
  rcv_amt: recovery
  fl_evt: ind_dft
  fl_wo: ind_CO
  fl_close: ind_closed
  new_evt: new_to_dft
  lag_fl_evt: lag_ind_dft
  sc_orig: score_orig
  sc_curr: score_bhv
  dt_start: dt_opened
  mos_bk: mob
  ann_rate: interest_rate
  grp1: perf_lvl1
  grp2: perf_lvl2
  dt_end: maturity_dt
  tot_term: ln_term
  rem_term: remaining_term
  face_val: ln_value
  init_amt: booked_amt
  fl_restr: ind_restructure
  fwd_amt: next_dft_bal
  mos_to_evt: mths_to_dft

filters: {}

output:
  directory: "output/mx_mg_test/"
  issue_log: "Issue_Log_MX_MG_Test.xlsx"
  charts_dir: "output/mx_mg_test/charts/"
