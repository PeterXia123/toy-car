project:
  name: "MX Credit Card"
  country: MX
  product: CC
  product_type: revolving
  entity: ATL

data:
  path: "data/mx_cc/"
  file: "MX__RM_perf.parquet"
  format: parquet

column_mapping:
  rpt_mth: obs_month
  eid: acct_id
  past_d: dpd
  past_c: cyc_pst_due
  cur_amt: balance
  fl_close: ind_closed
  fl_wo: ind_CO
  fl_evt: ind_dft
  lag_fl_evt: lag_ind_dft
  new_evt: new_to_dft
  sc_orig: score_orig
  sc_curr: score_bhv
  grp1: perf_lvl1
  grp2: perf_lvl2
  dt_start: dt_opened
  dt_end: maturity_dt
  tot_term: ln_term
  rem_term: remaining_term
  mos_bk: mob
  rcv_amt: recovery
  ann_rate: interest_rate
  face_val: ln_value
  init_amt: booked_amt
  fl_restr: ind_restructure
  max_lim: current_limit

filters:
  exclude_months: []
  grp1_filter: null

output:
  directory: "output/MX_CC/"
  issue_log: "MX_CC_Issue_Log.xlsx"
  charts_dir: "output/MX_CC/charts/"
