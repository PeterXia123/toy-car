project:
  name: "MX Mortgage Validation"
  country: MX
  product: MG
  product_type: term
  entity: "BNS-MOR"

data:
  # 修改为你的parquet文件实际路径
  path: ""
  file: "/path/to/your/mx_mortgage_perf.parquet"
  format: parquet

column_mapping:
  # 标准名: 实际parquet列名
  rpt_mth: obs_month
  eid: acct_id
  past_d: dpd
  past_c: cyc_pst_due
  cur_amt: balance
  rcv_amt: recovery
  fl_evt: ind_dft
  fl_wo: ind_CO
  fl_close: ind_closed
  new_evt: new_to_dft
  lag_fl_evt: lag_ind_dft
  sc_orig: score_orig
  sc_curr: score_bhv
  dt_start: dt_opened
  mos_bk: mob
  ann_rate: interest_rate
  grp1: perf_lvl1
  grp2: perf_lvl2
  dt_end: maturity_dt
  tot_term: ln_term
  rem_term: remaining_term
  fl_restr: ind_restructure
  face_val: ln_value
  init_amt: booked_amt
  fl_excl: ind_excl
  fwd_amt: next_dft_bal
  mos_to_evt: mths_to_dft

filters: {}

output:
  directory: "output/mx_mg/"
  issue_log: "Issue_Log_MX_MG.xlsx"
  charts_dir: "output/mx_mg/charts/"
