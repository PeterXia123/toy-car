  new_to_dft: new_to_dft
  lag_ind_dft: lag_ind_dft
  score_orig: score_orig
  score_bhv: score_bhv
  dt_opened: dt_opened
  mob: mob
  interest_rate: interest_rate
  perf_lvl1: perf_lvl1
  perf_lvl2: perf_lvl2

filters: {}

output:
  directory: "output/mx_cc_test/"
  issue_log: "Issue_Log_MX_CC_Test.xlsx"
  charts_dir: "output/mx_cc_test/charts/"
