project:
  name: "MX Credit Card - Synthetic Test"
  country: MX
  product: CC
  product_type: revolving
  entity: "Test Entity"

data:
  path: "test_data"
  file: "mx_cc_synthetic.parquet"
  format: parquet

column_mapping:
  rpt_mth: obs_month
  eid: acct_id
  past_d: dpd
  past_c: cpd
  cur_amt: balance
  rcv_amt: recovery
  fl_evt: ind_dft
  fl_wo: ind_CO
  fl_close: ind_closed
  new_evt: new_to_dft
  lag_fl_evt: lag_ind_dft
  sc_orig: score_orig
  sc_curr: score_bhv
  dt_start: dt_opened
  mos_bk: mob
  ann_rate: interest_rate
  grp1: perf_lvl1
  grp2: perf_lvl2

filters: {}

output:
  directory: "output/mx_cc_test/"
  issue_log: "Issue_Log_MX_CC_Test.xlsx"
  charts_dir: "output/mx_cc_test/charts/"
